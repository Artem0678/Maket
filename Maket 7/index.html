<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="StyleSheet.css">

  <title>Frontend Mentor | NFT preview card component</title>

</head>
<body>

  <article class="card">
    <div class="card__img-container">
      <img class="card__img" src="images/image-equilibrium.jpg" alt="Equilibrium-jpg">
    </div>

    <div class="card__content">

      <h1 class="card__title">Equilibrium #3429</h1>

      <p class="card__description">Our Equilibrium collection promotes balance and calm.</p>

      <div class="card__balance">
        <div class="balance__value-section">
          <img class="balance__img" src="images/icon-ethereum.svg">
          <span class="balance__value">0.041 ETH</span>
        </div>
        <div class="balance__date-section">
        <img src="images/icon-clock.svg">
        <span class="balance__value-change">3 days left</span>
        </div>
      </div>

      <hr>
      <footer class="card__author-info">
      <img  class=card__author-image src="images/image-avatar.png">
      <p class="card__author-name">Creation of Jules Wyvern</p>
      </footer>
    </div>
  </article>

</body>
</html>
