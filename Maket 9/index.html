<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="StyleSheet.css">

  <title>Frontend Mentor | Stats preview card component</title>

</head>
<body>

  <article class="card">

    <div class="card__content">

    <h1 class="card__title">Get <span>insights</span> that help your business grow.</h1>

    <p class="card__description">Discover the benefits of data analytics and make better decisions regarding revenue, customer
    experience, and overall efficiency.
    </p>

      <section class="card__partner-info">
        <p>10k+ <span>companies</span></p>
        <p>314 <span>templates</span></p>
        <p>12M+ <span>queries</span></p>
      </section>

    </div>

    <div class="card__image-container">
      <img  class="card__image"src="images/image-header-desktop.jpg" alt="business">
    </div>
  </article>

</body>
</html>
