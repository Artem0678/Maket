<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка товара</title>
    <link rel="stylesheet" href="StyleSheet.css">

</head>

<body>

<main class="wrapper">

    <article class="product-card">

        <div class="product-card__image-container">
            <img class="product-card__image" src="images/image-product-desktop.jpg" alt="Gabrielle Essence Eau De Parfum CHANEL">
        </div>

        <div class="product-card__content">

            <span class="content__category">Perfume</span>

            <h1 class="content__title">Gabrielle Essence Eau De Parfum</h1>

            <p class="content__description">
                A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.
            </p>

            <div class="content__price">
                <span class="price__current">$149.99</span>
                <span class="price__old">$169.99</span>
            </div>

            <button class="content__btn-add"><img src="images/icon-cart.svg">Add to Cart</button>

        </div>

    </article>

</main>

</body>

</html>
