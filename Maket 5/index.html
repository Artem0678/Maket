<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="StyleSheet.css">
  <title>Frontend Mentor | Results summary component</title>

</head>
<body>

  <main class="card">
    <article class="result-card">

      <h1>Your Result</h1>

      <div class="result-card__score">
        <p class="result-card__score-value">76</p>
        <span class="result-card__score-total">of 100</span>
      </div>

      <div class="result-card__feedback">
        <p class="result-card__feedback-heading">Great</p>
        <span class="result-card__feedback-text">You scored higher than 65% of the people who have taken these tests.</span>
      </div>

    </article>

    <article class="metrick-card">

      <h1>Summary</h1>


      <div class="metrick-card__reaction">
        <section>
          <img src="assets/images/icon-reaction.svg">
          Reaction
        </section>
        <span><strong>80</strong> / 100</span>
      </div>

      <div class="metrick-card__memory">
        <section>
          <img src="assets/images/icon-memory.svg">
          Memory
        </section>
        <span><strong>92</strong> / 100</span>
      </div>

      <div class="metrick-card__verbal">
        <section>
          <img src="assets/images/icon-verbal.svg">
          Verbal
        </section>
        <span><strong>61</strong> / 100</span>
      </div>

      <div class="metrick-card__visual">
        <section>
          <img src="assets/images/icon-visual.svg">
          Visual
        </section>
        <span><strong>72</strong> / 100</span>
      </div>

      <p class="metrick-card__continue">Continue</p>
    </article>
  </main>

</body>
</html>
