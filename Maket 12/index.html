<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="StyleSheets.css">

  <title>Frontend Mentor | Profile card component</title>

</head>
<body>

  <article class="card">
    <div class="card__image-container">
      <img  class="card__background-image" src="images/bg-pattern-card.svg" alt="background">
      <img class="card__avatar-image" src="images/image-victor.jpg" alt="avatar-victor">
    </div>

    <div class="card__content">
      <p class="card__name">Victor Crest <span class="card__age">26</span></p>
      <p class="card__city">London</p>

      <hr class="card__dividing-line">

      <section class="card__info">

      <div class="card__followers">
        <p>80K</p>
        <span>Followers</span>
      </div>

      <div class="card__likes">
        <p>803K</p>
        <span>Likes</span>
      </div>

      <div class="card__photos">
        <p>1.4K</p>
        <span>Photos</span>
      </div>
      </section>
    </div>
  </article>

</body>
</html>
