<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="stylesheet" href="StyleSheet.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Order summary card</title>


</head>
<body>
  <article class="card">

    <div class="card__image-container">
      <img class="card__image" src="images/illustration-hero.svg" alt="music-girl">
    </div>


    <h1 class="card__title">Order Summary</h1>

  <p class="card__description">You can now listen to millions of songs, audiobooks, and podcasts on any
    device anywhere you like!</p>

  <div class="card__value-container">
    <section>
      <div class="card__value-image-container">
        <img class="card__value-image" src="images/icon-music.svg" alt="icon-music">
      </div>

      <div class="card__value-content-container">
        <span class="card__value-plan">Annual Plan</span>
        <span class="card__value-cost">$59.99/year</span>
      </div>
    </section>
  <a class="card__change-button" href="preview.jpg">Change</a>

  </div>


  <button class="card__payment-button">Proceed to Payment</button>
  <a class="card__cancel-button" href="preview.jpg">Cancel Order</a>

  </article>
</body>
</html>
