<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="StyleSheet.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>

</head>
<body>

  <article class="info-card">

    <img class="info-card__image"src="assets/images/illustration-article.svg" alt="preview">

    <div class="info-card__content">
      <span class="info-card__badge">Learning</span>

      <time class="info-card__date">Published 21 Dec 2023</time>

      <h1 class="info-card__title">
        <a href="https://developer.mozilla.org/">HTML & CSS foundations</a>
      </h1>

      <p class="info-card__description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
    </div>

    <footer class="info-card__author">
      <img src="assets/images/image-avatar.webp" alt="Author_Avatar">
      <span class="info-card__author-name">Greg Hooper</span>
    </footer>

  </article>

</body>
</html>
